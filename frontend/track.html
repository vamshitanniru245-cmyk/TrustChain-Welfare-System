</head>

<body>

<h1>Track Your Application</h1>

<div class="card">
    <input type="text" id="hash" placeholder="Enter Transaction Hash">

```
<button onclick="track()">Check Status</button>

<div id="result"></div>
```

</div>

<script>
function track() {
    const hash = document.getElementById("hash").value.trim();
    const resultDiv = document.getElementById("result");

    if (!hash) {
        resultDiv.className = "result error";
        resultDiv.innerText = "Please enter a transaction hash";
        return;
    }

    fetch("http://127.0.0.1:5000/track", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ tx_hash: hash })
    })
    .then(res => res.json())
    .then(data => {
        if (data.result) {
            resultDiv.className = "result error";
            resultDiv.innerText = data.result;
            return;
        }

        resultDiv.className = "result success";
        resultDiv.innerHTML =
            "<b>Status:</b> " + data.status +
            "<br><b>Scheme:</b> " + data.scheme +
            "<br><b>Amount:</b> ₹" + data.amount +
            "<br><b>Time:</b> " + data.time;
    })
    .catch(() => {
        resultDiv.className = "result error";
        resultDiv.innerText = "Error connecting to server";
    });
}
</script>

</body>
