</head>

<body>

<h1 id="title">Apply for Scheme</h1>

<div class="container">

```
<!-- LEFT: INPUT -->
<div class="card">
    <h2>Enter Details</h2>

    <input type="text" id="aadhaar" placeholder="Enter Aadhaar Number">

    <button onclick="fetchUser()">Fetch Details</button>

    <div id="details" class="details"></div>

    <button onclick="applyScheme()">Check Eligibility</button>
</div>

<!-- RIGHT: RESULT -->
<div class="card">
    <h2>Result</h2>

    <div id="result"></div>
</div>
```

</div>

<script>

// get scheme from URL
const params = new URLSearchParams(window.location.search);
const scheme = params.get("scheme");

document.getElementById("title").innerText =
    "Apply for " + scheme.toUpperCase();


// 🔹 Fetch user
function fetchUser() {
    const aadhaar = document.getElementById("aadhaar").value;

    fetch("http://127.0.0.1:5000/get_user", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ aadhaar })
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            document.getElementById("details").innerHTML =
                "<p style='color:red'>" + data.error + "</p>";
            return;
        }

        document.getElementById("details").innerHTML =
            "<p><b>Name:</b> " + data.name + "</p>" +
            "<p><b>Income:</b> ₹" + data.income + "</p>" +
            "<p><b>Claims:</b> " + data.claim_count + "</p>";
    });
}


// 🔹 Apply scheme
function applyScheme() {
    const aadhaar = document.getElementById("aadhaar").value;

    fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            aadhaar: aadhaar,
            scheme: scheme
        })
    })
    .then(res => res.json())
    .then(data => {
        let resultDiv = document.getElementById("result");

        // ❌ errors
        if (
            data.result.includes("Invalid") ||
            data.result.includes("Not Eligible") ||
            data.result.includes("Fraud")
        ) {
            resultDiv.className = "result error";
            resultDiv.innerHTML =
                data.result +
                (data.reason ? "<br><br>Reason: " + data.reason : "");
            return;
        }

        // ✅ success
        if (data.result.includes("Approved")) {
            resultDiv.className = "result success";
            resultDiv.innerHTML =
                "✅ Approved<br><br>" +
                "Amount: ₹" + data.amount +
                "<div class='hash'>" + data.tx_hash + "</div>" +
                "<button class='copy-btn' onclick='copyHash()'>📋 Copy Hash</button>";

            window.currentHash = data.tx_hash;
        }
    });
}


// 🔹 copy tx hash
function copyHash() {
    navigator.clipboard.writeText(window.currentHash);
    alert("Transaction Hash Copied!");
}

</script>

</body>
